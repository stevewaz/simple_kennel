name: simple_kennel
description: "PawBook - Kennel management app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  pocketbase_drift: ^0.4.3
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  provider: ^6.1.2
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#7B5EA7"
  color_dark: "#4A3570"
  android: true
  ios: true
  web: true

flutter:
  uses-material-design: true
